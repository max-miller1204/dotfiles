---
# Single source of truth for every package the bootstrap installs.
# Each entry carries its per-platform method as data.
# chezmoi auto-loads .chezmoidata/*, exposing `packages` and `aptrepos` to
# every template.
# run_once_before_10-install-packages.sh.tmpl walks `.packages` once and
# dispatches entries to helpers in .chezmoitemplates/lib-install.sh.
# Adding a tool is a one-stanza edit here with no shell edits.
#
# Order matters on Linux because the list is walked top-to-bottom.
# `gnupg` precedes the `op` and `gh` apt repositories.
# `software-properties-common` precedes the `ghostty` PPA.
# macOS methods are order-independent and idempotent.
#
# Per-package fields:
#   name  - human label used in logs
#   gui   - desktop app skipped when headless or on WSL
#   bin   - command used by method guards where required
#   darwin / linux / any - platform method or shared fallback
#
# Method vocabulary:
#   brew:    <formula>            strict `brew install`
#   cask:    <cask>               tolerant `brew install --cask`
#   apt:     <pkg> [ppa: <ppa>]   apt package with optional PPA
#   aptrepo: <name>               third-party apt repository
#   flatpak: <app-id>             Flatpak from Flathub
#   deburl:  <url>                downloaded .deb installed through apt
#   script:  <cmd> [dpkg]         vendor installer emitted verbatim
#   tolerant                       allow an optional brew entry to fail
#
# Active Home Manager packages are absent from this manifest:
# eza, gum, starship, atuin, bat, fd, ripgrep, zoxide, tmux, fzf, Neovim,
# direnv, nix-direnv, pyright, TypeScript, typescript-language-server, gopls,
# rust-analyzer, clang-tools, fnm, uv, rustup, Go, and Bun.
# nix/data/tool-ownership.json is their machine-checked ownership source.

packages:
  # ---- core CLI, native on each OS (Homebrew macOS / apt Linux) ----
  # fish and git stay apt on Linux; jq deliberately stays native too.
  # jq is an apply-time dependency of the Home Manager identity check and the
  # MCP and plugin scripts and is used bare in obsidian's installer, so it must
  # not depend on user runtime paths that are unavailable during a fresh apply.
  - name: fish
    gui: false
    bin: fish
    darwin: { brew: fish }
    linux: { apt: fish }
  - name: git
    gui: false
    bin: git
    darwin: { brew: git }
    linux: { apt: git }
  - name: jq
    gui: false
    bin: jq
    darwin: { brew: jq }
    linux: { apt: jq }

  # ---- Ubuntu base apt packages with no macOS counterpart. ----
  # curl and ca-certificates support vendor installers.
  # gnupg backs the op and gh repositories.
  # software-properties-common backs the ghostty PPA.
  - name: curl
    gui: false
    bin: curl
    linux: { apt: curl }
  - name: wget
    gui: false
    bin: wget
    linux: { apt: wget }
  - name: ca-certificates
    gui: false
    linux: { apt: ca-certificates }
  - name: gnupg
    gui: false
    bin: gpg
    linux: { apt: gnupg }
  - name: build-essential
    gui: false
    linux: { apt: build-essential }
  - name: software-properties-common
    gui: false
    bin: add-apt-repository
    linux: { apt: software-properties-common }
  - name: zenity
    gui: false
    bin: zenity
    linux: { apt: zenity }

  # ---- gh: native for the newest upstream release. ----
  # Homebrew owns it on macOS; GitHub's apt repository owns it on Linux.
  # gh stays native because a runtime-manager shim can be invisible to any
  # process launched with a sanitized PATH - notably the no-mistakes daemon's git
  #      subprocess - whereas an apt gh at /usr/bin/gh sits on the plain system
  #      PATH everything sees, so no per-machine symlink stopgap is needed. ----
  - name: gh
    gui: false
    bin: gh
    darwin: { brew: gh }
    linux: { aptrepo: gh }

  # ---- op: deliberately native. ----
  # It stays native on Linux via a debsig-verified third-party apt-repo (needs
  # gnupg above) and Homebrew on macOS. op unlocks chezmoi's secret reads at
  # apply time, before user runtime managers are initialized. ----
  - name: 1password-cli
    gui: false
    bin: op
    darwin: { brew: 1password-cli }
    linux: { aptrepo: 1password-cli }

  # ---- remaining curl-installed CLI tools. ----
  # pfetch and brev use brew on macOS and vendor installers on Ubuntu.
  # treehouse, no-mistakes, and herdr use the same installer on both OSes.
  # These carry shell quoting that cannot round-trip through a helper, so the
  # loop emits them verbatim.
  - name: pfetch
    gui: false
    bin: pfetch
    darwin: { brew: pfetch }
    linux:
      script: >-
        base=https://raw.githubusercontent.com;
        curl -fsSL "$base/dylanaraps/pfetch/master/pfetch"
        -o "$HOME/.local/bin/pfetch" &&
        chmod +x "$HOME/.local/bin/pfetch"
  - name: brev
    gui: false
    bin: brev
    darwin: { brew: brevdev/homebrew-brev/brev, tolerant: true }
    # Deliberately NOT sudo: the upstream installer places the binary in
    # $HOME/.local/bin, so sudo would strand brev in /root/.local/bin
    # where no user PATH (nor run_once_after_70's probe) can see it.
    linux:
      script: >-
        base=https://raw.githubusercontent.com;
        bash -c "$(curl -fsSL
        "$base/brevdev/brev-cli/main/bin/install-latest.sh")"
  # treehouse, no-mistakes, and herdr (agent multiplexer / terminal workspace
  # manager) are self-contained prebuilt binaries whose official curl installers
  # behave identically on macOS and Linux - curl works in every environment, no
  # brew tap needed - so each declares its command ONCE under the shared `any:`
  # key. treehouse and no-mistakes pick their target dir - the binary for
  # treehouse, the symlink for no-mistakes, whose binary always lands in
  # ~/.no-mistakes/bin - by testing ~/.local/bin for $PATH MEMBERSHIP alone, and
  # otherwise fall back to a sudo install into /usr/local/bin. Before this loop
  # runs, run_once_before_10 puts ~/.local/bin on PATH and creates it; the mkdir
  # separately keeps treehouse's own `[ -w ]` check off that sudo branch.
  # herdr always installs to ~/.local/bin and never uses sudo. Like brev/pfetch
  # they need no toolchain and are safe in the package loop.
  # herdr's config lives in dot_config/herdr/config.toml.
  - name: treehouse
    gui: false
    bin: treehouse
    any:
      script: >-
        curl -fsSL https://kunchenguid.github.io/treehouse/install.sh
        | sh
  - name: no-mistakes
    gui: false
    bin: no-mistakes
    any:
      script: >-
        base=https://raw.githubusercontent.com;
        curl -fsSL "$base/kunchenguid/no-mistakes/main/docs/install.sh"
        | sh
  - name: herdr
    gui: false
    bin: herdr
    any: { script: "curl -fsSL https://herdr.dev/install.sh | sh" }

  # ---- GUI desktop apps (cask on macOS; skipped when headless or on WSL) ----
  - name: ghostty
    gui: true
    bin: ghostty
    darwin: { cask: ghostty }
    linux: { apt: ghostty, ppa: "ppa:mkasberg/ghostty-ubuntu" }
  - name: discord
    gui: true
    bin: discord
    darwin: { cask: discord }
    linux:
      { deburl: "https://discord.com/api/download?platform=linux&format=deb" }
  - name: google-chrome
    gui: true
    bin: google-chrome-stable
    darwin: { cask: google-chrome }
    linux:
      deburl: "https://dl.google.com/linux/direct/\
        google-chrome-stable_current_amd64.deb"
  # 1Password desktop app, distinct from the `op` CLI (1password-cli) above (its
  # cask is `1password`, the CLI's is `1password-cli`). On Linux, a direct .deb
  # download per the user's request; apt resolves its deps and does not enforce
  # debsig on a local .deb, independently of the CLI apt repository.
  # dpkg resolves the architecture at the call site, like obsidian's URL.
  - name: 1password
    gui: true
    bin: 1password
    darwin: { cask: 1password }
    linux:
      deburl: "https://downloads.1password.com/linux/debian/\
        $(dpkg --print-architecture)/stable/1password-latest.deb"
  - name: voquill
    gui: true
    darwin: { cask: voquill/voquill/voquill-desktop }
    linux:
      script: "curl -fsSL https://voquill.github.io/apt/install.sh | bash"
      dpkg: voquill-desktop
  - name: obsidian
    gui: true
    bin: obsidian
    darwin: { cask: obsidian }
    linux:
      deburl: >-
        $(base=https://api.github.com/repos;
        curl -fsSL "$base/obsidianmd/obsidian-releases/releases/latest" |
        jq -r '.assets[] | select(.name | endswith("_amd64.deb")) |
        .browser_download_url' | head -n1)
  - name: anki
    gui: true
    darwin: { cask: anki }
    linux: { flatpak: net.ankiweb.Anki }
  - name: spotify
    gui: true
    darwin: { cask: spotify }
    linux: { flatpak: com.spotify.Client }
  - name: zoom
    gui: true
    darwin: { cask: zoom }
    linux: { flatpak: us.zoom.Zoom }

  # ---- macOS-only GUI casks ----
  - name: firefox
    gui: true
    darwin: { cask: firefox }
  - name: aerospace
    gui: true
    darwin: { cask: nikitabobko/tap/aerospace }
  - name: karabiner-elements
    gui: true
    darwin: { cask: karabiner-elements }
  - name: raycast
    gui: true
    darwin: { cask: raycast }
  - name: zed
    gui: true
    darwin: { cask: zed }
  - name: neovide-app
    gui: true
    darwin: { cask: neovide-app }
  - name: balenaetcher
    gui: true
    darwin: { cask: balenaetcher }
  - name: macdown-3000
    gui: true
    darwin: { cask: macdown-3000 }
  - name: pearcleaner
    gui: true
    darwin: { cask: pearcleaner }
  - name: font-jetbrains-mono-nerd-font
    gui: true
    darwin: { cask: font-jetbrains-mono-nerd-font }

# ---- third-party apt repositories keyed by the `aptrepo:` value. ----
# GitHub CLI and 1Password are the native apt repository installs.
# Each entry carries the six arguments that install_aptrepo needs.
# GitHub's published keyring is already binary, but `gpg --dearmor` passes
# binary OpenPGP input through byte-for-byte, so the shared path works.
# 1Password also ships a debsig policy and keyring in the `debsig` block.
aptrepos:
  gh:
    label: "GitHub CLI"
    keyring: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    key_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    repo_line: >-
      deb [arch=$(dpkg --print-architecture)
      signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    list_path: /etc/apt/sources.list.d/github-cli.list
    package: gh
  1password-cli:
    label: "1Password CLI"
    keyring: /usr/share/keyrings/1password-archive-keyring.gpg
    key_url: https://downloads.1password.com/linux/keys/1password.asc
    repo_line: >-
      deb [arch=$(dpkg --print-architecture)
      signed-by=/usr/share/keyrings/1password-archive-keyring.gpg]
      https://downloads.1password.com/linux/debian/$(dpkg --print-architecture)
      stable main
    list_path: /etc/apt/sources.list.d/1password.list
    package: 1password-cli
    debsig:
      policy_id: AC2D62742012EA22
      pol_url: https://downloads.1password.com/linux/debian/debsig/1password.pol
      key_url: https://downloads.1password.com/linux/keys/1password.asc
