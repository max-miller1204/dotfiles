# Single source of truth for every package the bootstrap installs, described once
# with its per-platform install method carried as data. chezmoi auto-loads
# .chezmoidata/*, so `packages` is available as `.packages` (and `aptrepos` as
# `.aptrepos`) in every template; run_once_before_10-install-packages.sh.tmpl
# walks `.packages` in one loop and dispatches each entry to the matching helper
# in .chezmoitemplates/lib-install.sh by OS + method. Adding a tool is a one-line
# (one-stanza) edit here - no shell edits.
#
# Order matters on Linux: the list is walked top-to-bottom, so a prerequisite must
# precede its consumers. `curl` + `ca-certificates` come before `mise` (its
# installer curls over https); `mise` comes before every `mise:` tool (install_mise
# silently no-ops if mise is not resolvable yet); `gnupg` (gpg) comes before the
# `op` and `gh` apt-repos; `software-properties-common` (add-apt-repository) comes before the
# `ghostty` PPA. On macOS every method is brew/cask, which are order-independent
# and idempotent, so the emission order is immaterial there.
#
# Per-package fields:
#   name  - human label, used in log lines
#   gui   - true for desktop apps; GUI packages are skipped when headless or on WSL
#           (Windows-native versions are used there instead). Non-GUI CLI tools
#           install everywhere.
#   bin   - the command the method guards on (command -v <bin>) where the method
#           needs a command-name guard (apt+ppa, deburl, mise); omit where the
#           method carries its own guard (flatpak app id, script dpkg, aptrepo
#           lookup).
#   darwin / linux - the install method for that OS, as a single-key map:
#     brew:    <formula>            strict `brew install` (core CLI formulae)
#     cask:    <cask>               `brew install --cask` (tolerant, `|| true`)
#     apt:     <pkg> [ppa: <ppa>]   apt package; optional PPA added first
#     aptrepo: <name>               third-party apt repo; params from `aptrepos.<name>`
#     flatpak: <app-id>             flatpak from flathub
#     deburl:  <url>                download a .deb from <url> and apt-install it
#     script:  <cmd> [altpath/dpkg] curl-style vendor installer run verbatim
#     mise:    <tool>              mise-managed tool (aqua backend); Linux CLI tools
#   tolerant - on a brew entry, append `|| true` (optional/extra formula, e.g. brev)
#
# fzf is intentionally absent: the README designates mise (fzf@latest, installed in
# the mise toolchains block) as its owner, so it must not also come from brew/apt.

packages:
  # ---- core CLI, cross-platform, native on each OS (brew macOS / apt Linux) ----
  # fish/git/tmux stay apt on Linux; jq deliberately stays native too - it is a
  # `command -v jq || exit 1` dependency of the apply-time MCP/plugin scripts and
  # is used bare in obsidian's installer, so it must not depend on mise shims that
  # are not on PATH during a fresh apply.
  - name: fish
    gui: false
    bin: fish
    darwin: { brew: fish }
    linux:  { apt: fish }
  - name: git
    gui: false
    bin: git
    darwin: { brew: git }
    linux:  { apt: git }
  - name: tmux
    gui: false
    bin: tmux
    darwin: { brew: tmux }
    linux:  { apt: tmux }
  - name: jq
    gui: false
    bin: jq
    darwin: { brew: jq }
    linux:  { apt: jq }

  # ---- Ubuntu base apt packages (no macOS counterpart). curl + ca-certificates
  #      come first because the mise bootstrap below curls its installer over
  #      https; gnupg backs the op apt-repo and software-properties-common backs
  #      the ghostty PPA further down. ----
  - name: curl
    gui: false
    bin: curl
    linux: { apt: curl }
  - name: wget
    gui: false
    bin: wget
    linux: { apt: wget }
  - name: ca-certificates
    gui: false
    linux: { apt: ca-certificates }
  - name: gnupg
    gui: false
    bin: gpg
    linux: { apt: gnupg }
  - name: build-essential
    gui: false
    linux: { apt: build-essential }
  - name: software-properties-common
    gui: false
    bin: add-apt-repository
    linux: { apt: software-properties-common }
  - name: zenity
    gui: false
    bin: zenity
    linux: { apt: zenity }

  # ---- mise: the Linux install backend for the cross-platform CLI tools below,
  #      so it must be installed before any of them (brew on macOS). ----
  - name: mise
    gui: false
    bin: mise
    darwin: { brew: mise }
    linux:
      script: "curl https://mise.run | sh"
      altpath: "$HOME/.local/bin/mise"

  # ---- cross-platform CLI tools: mise (aqua backend) on Linux, brew on macOS.
  #      Consolidated onto mise on Linux - these were previously apt (bat/fd/
  #      ripgrep/zoxide), third-party apt-repo+keyring (eza/gum), or curl vendor
  #      installers (starship/atuin). Every entry here must follow the mise entry
  #      above. ----
  - name: eza
    gui: false
    bin: eza
    darwin: { brew: eza }
    linux:  { mise: "aqua:eza-community/eza" }
  - name: gum
    gui: false
    bin: gum
    darwin: { brew: gum }
    linux:  { mise: "aqua:charmbracelet/gum" }
  - name: starship
    gui: false
    bin: starship
    darwin: { brew: starship }
    linux:  { mise: "aqua:starship/starship" }
  - name: atuin
    gui: false
    bin: atuin
    darwin: { brew: atuin }
    linux:  { mise: "aqua:atuinsh/atuin" }
  - name: bat
    gui: false
    bin: bat
    darwin: { brew: bat }
    linux:  { mise: "aqua:sharkdp/bat" }
  - name: fd
    gui: false
    bin: fd
    darwin: { brew: fd }
    linux:  { mise: "aqua:sharkdp/fd" }
  - name: ripgrep
    gui: false
    bin: rg
    darwin: { brew: ripgrep }
    linux:  { mise: "aqua:BurntSushi/ripgrep" }
  - name: zoxide
    gui: false
    bin: zoxide
    darwin: { brew: zoxide }
    linux:  { mise: "aqua:ajeetdsouza/zoxide" }
  # ---- gh (GitHub CLI): native on both OSes for the newest upstream release -
  #      brew on macOS, GitHub's official apt-repo on Linux (needs curl + gnupg
  #      from the base apt block above; params in `aptrepos.gh`). Deliberately NOT
  #      mise: a mise-shim gh is invisible to any process launched with a sanitized
  #      PATH that drops the shims dir - notably the no-mistakes daemon's git
  #      subprocess - whereas an apt gh at /usr/bin/gh sits on the plain system
  #      PATH everything sees, so no per-machine symlink stopgap is needed. ----
  - name: gh
    gui: false
    bin: gh
    darwin: { brew: gh }
    linux:  { aptrepo: gh }

  # ---- op (1Password CLI): deliberately NOT moved to mise. Stays native on Linux
  #      via a debsig-verified third-party apt-repo (needs gnupg above); brew on
  #      macOS. Kept native because op unlocks chezmoi's secret reads at apply
  #      time, before mise shims are on PATH. ----
  - name: 1password-cli
    gui: false
    bin: op
    darwin: { brew: 1password-cli }
    linux:  { aptrepo: 1password-cli }

  # ---- remaining curl-installed CLI tools (brew on macOS, vendor installer on
  #      Ubuntu). mise itself lives above; these carry shell quoting that cannot
  #      round-trip through a helper, so the loop emits them verbatim. ----
  - name: pfetch
    gui: false
    bin: pfetch
    darwin: { brew: pfetch }
    linux:  { script: "curl -fsSL https://raw.githubusercontent.com/dylanaraps/pfetch/master/pfetch -o \"$HOME/.local/bin/pfetch\" && chmod +x \"$HOME/.local/bin/pfetch\"" }
  - name: brev
    gui: false
    bin: brev
    darwin: { brew: brevdev/homebrew-brev/brev, tolerant: true }
    # Deliberately NOT sudo: the upstream installer places the binary in
    # $HOME/.local/bin, so running it under sudo strands brev in /root/.local/bin
    # where no user PATH (nor run_once_after_70's probe) can see it.
    linux:  { script: "bash -c \"$(curl -fsSL https://raw.githubusercontent.com/brevdev/brev-cli/main/bin/install-latest.sh)\"" }
  # treehouse and no-mistakes are self-contained prebuilt binaries their curl
  # installers drop into ~/.local/bin (created above), so like brev/pfetch they need
  # no toolchain and are safe here in the loop, ahead of the mise toolchains block.
  - name: treehouse
    gui: false
    bin: treehouse
    linux:  { script: "curl -fsSL https://kunchenguid.github.io/treehouse/install.sh | sh" }
  - name: no-mistakes
    gui: false
    bin: no-mistakes
    linux:  { script: "curl -fsSL https://raw.githubusercontent.com/kunchenguid/no-mistakes/main/docs/install.sh | sh" }

  # ---- GUI desktop apps (cask on macOS; skipped when headless or on WSL) ----
  - name: ghostty
    gui: true
    bin: ghostty
    darwin: { cask: ghostty }
    linux:  { apt: ghostty, ppa: "ppa:mkasberg/ghostty-ubuntu" }
  - name: discord
    gui: true
    bin: discord
    darwin: { cask: discord }
    linux:  { deburl: "https://discord.com/api/download?platform=linux&format=deb" }
  - name: google-chrome
    gui: true
    bin: google-chrome-stable
    darwin: { cask: google-chrome }
    linux:  { deburl: "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb" }
  # 1Password desktop app, distinct from the `op` CLI (1password-cli) above (its
  # cask is `1password`, the CLI's is `1password-cli`). On Linux, a direct .deb
  # download per the user's request; apt resolves its deps and does not enforce
  # debsig on a local .deb, so this is independent of the CLI's apt-repo/debsig setup.
  # $(dpkg --print-architecture) is evaluated at the call site (like obsidian's URL).
  - name: 1password
    gui: true
    bin: 1password
    darwin: { cask: 1password }
    linux:  { deburl: "https://downloads.1password.com/linux/debian/$(dpkg --print-architecture)/stable/1password-latest.deb" }
  - name: voquill
    gui: true
    darwin: { cask: voquill/voquill/voquill-desktop }
    linux:
      script: "curl -fsSL https://voquill.github.io/apt/install.sh | bash"
      dpkg: voquill-desktop
  - name: obsidian
    gui: true
    bin: obsidian
    darwin: { cask: obsidian }
    linux:  { deburl: "$(curl -fsSL https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest | jq -r '.assets[] | select(.name | endswith(\"_amd64.deb\")) | .browser_download_url' | head -n1)" }
  - name: anki
    gui: true
    darwin: { cask: anki }
    linux:  { flatpak: net.ankiweb.Anki }
  - name: spotify
    gui: true
    darwin: { cask: spotify }
    linux:  { flatpak: com.spotify.Client }
  - name: zoom
    gui: true
    darwin: { cask: zoom }
    linux:  { flatpak: us.zoom.Zoom }

  # ---- macOS-only GUI casks ----
  - name: firefox
    gui: true
    darwin: { cask: firefox }
  - name: aerospace
    gui: true
    darwin: { cask: nikitabobko/tap/aerospace }
  - name: karabiner-elements
    gui: true
    darwin: { cask: karabiner-elements }
  - name: raycast
    gui: true
    darwin: { cask: raycast }
  - name: zed
    gui: true
    darwin: { cask: zed }
  - name: neovide-app
    gui: true
    darwin: { cask: neovide-app }
  - name: balenaetcher
    gui: true
    darwin: { cask: balenaetcher }
  - name: macdown-3000
    gui: true
    darwin: { cask: macdown-3000 }
  - name: pearcleaner
    gui: true
    darwin: { cask: pearcleaner }
  - name: font-jetbrains-mono-nerd-font
    gui: true
    darwin: { cask: font-jetbrains-mono-nerd-font }

# ---- third-party apt-repo definitions, keyed by the `aptrepo:` value above ----
# GitHub CLI (gh) and 1Password (op) are the native apt-repo installs; eza and gum
# used to live here too but moved to mise (their apt-repos were removed). Each entry
# carries the six positional args the install_aptrepo helper needs (LABEL KEYRING
# KEY_URL REPO_LINE LIST_PATH PACKAGE). gh's published keyring is already binary, but
# install_aptrepo's `gpg --dearmor` is a byte-for-byte pass-through on binary OpenPGP
# input, so the same code path works and gh needs no debsig. 1Password additionally
# ships a debsig policy + keyring (independent of the apt keyring/list), carried as
# the `debsig` block and applied by install_debsig before install_aptrepo.
aptrepos:
  gh:
    label: "GitHub CLI"
    keyring: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    key_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    repo_line: "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    list_path: /etc/apt/sources.list.d/github-cli.list
    package: gh
  1password-cli:
    label: "1Password CLI"
    keyring: /usr/share/keyrings/1password-archive-keyring.gpg
    key_url: https://downloads.1password.com/linux/keys/1password.asc
    repo_line: "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main"
    list_path: /etc/apt/sources.list.d/1password.list
    package: 1password-cli
    debsig:
      policy_id: AC2D62742012EA22
      pol_url: https://downloads.1password.com/linux/debian/debsig/1password.pol
      key_url: https://downloads.1password.com/linux/keys/1password.asc
