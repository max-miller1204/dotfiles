name: Set up chezmoi
description: Install chezmoi + age, generate a throwaway age key, and initialize chezmoi from the checked-out source.

runs:
  using: composite
  steps:
    - name: Install age
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq age

    - name: Install chezmoi
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Generate throwaway age key
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.config/chezmoi"
        age-keygen -o "$HOME/.config/chezmoi/age-key.txt"

    - name: Initialize chezmoi config from source
      shell: bash
      env:
        CHEZMOI_SOURCE_DIR: ${{ github.workspace }}
      run: |
        set -euo pipefail
        "$HOME/.local/bin/chezmoi" init --source="$GITHUB_WORKSPACE"
