---
name: ci

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # The static-analysis jobs that render templates (shellcheck + fish-syntax)
  # run on macOS as well as Linux. `chezmoi execute-template` renders with the
  # runner's OS, so only the macos-latest leg exercises the darwin half of every
  # template ({{ if eq .chezmoi.os "darwin" }} ... {{ end }}); on ubuntu
  # those blocks are stripped before shellcheck / fish -n ever see them.
  # Both legs stay STATIC (render + lint only) - no real brew package installs.
  shellcheck:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y -qq shellcheck
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install shellcheck
      - name: Shellcheck plain scripts
        run: |
          set -euo pipefail
          shellcheck --severity=warning -s bash \
            dot_claude/executable_statusline.sh \
            .github/scripts/check-pi-model-pins.sh
          shellcheck --severity=warning -s sh \
            private_dot_local/bin/executable_zenity-askpass
          # Glob covers future tmux helpers and is a no-op if there are none.
          find dot_config/tmux -name 'executable_*.sh' \
            -exec shellcheck --severity=warning -s bash {} +
      - name: Shellcheck rendered script templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            chezmoi execute-template < "$f" \
              | shellcheck --severity=warning -s bash -
            echo "::endgroup::"
          done < <(find .chezmoiscripts -name '*.sh.tmpl' -print0)
      - name: Shellcheck LSP templates with persisted Phase 3 data
        run: |
          set -euo pipefail
          legacy_dir=$(mktemp -d)
          trap 'rm -rf "$legacy_dir"' EXIT
          legacy_config="$legacy_dir/chezmoi.toml"
          sed -e '/^[[:space:]]*probeBin =/d' \
            -e '/^[[:space:]]*probeArgs =/d' \
            -e '/^[[:space:]]*initializeProbe =/d' \
            -e '/^[[:space:]]*initializeWithoutNodePath =/d' \
            "$HOME/.config/chezmoi/chezmoi.toml" > "$legacy_config"
          for f in \
            .chezmoiscripts/run_before_15-activate-home-manager.sh.tmpl \
            .chezmoiscripts/run_after_50-verify-lsp-servers.sh.tmpl; do
            chezmoi --config "$legacy_config" execute-template < "$f" \
              | shellcheck --severity=warning -s bash -
          done

  fish-syntax:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install fish (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y -qq fish
      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install fish
      - name: fish -n on plain fish files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            fish -n "$f"
            echo "::endgroup::"
          done < <(find dot_config/fish -name '*.fish' -print0)
      - name: fish -n on rendered fish templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            # Use a template instead of `mktemp --suffix=.fish`, whose GNU-only
            # --suffix flag is absent on the macOS leg's BSD mktemp. `fish -n`
            # parses by content, so the file extension is irrelevant.
            tmp=$(mktemp "${TMPDIR:-/tmp}/ci-fish.XXXXXX")
            chezmoi execute-template < "$f" > "$tmp"
            fish -n "$tmp"
            rm -f "$tmp"
            echo "::endgroup::"
          done < <(find dot_config/fish -name '*.fish.tmpl' -print0)

  config-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install jq
        run: sudo apt-get install -y -qq jq
      - name: Validate TOML files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            python3 -c \
              'import sys, tomllib; tomllib.load(open(sys.argv[1], "rb"))' \
              "$f"
            echo "::endgroup::"
          done < <(find . -name '*.toml' ! -path './.git/*' -print0)
      - name: Validate JSON files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            jq empty "$f"
            echo "::endgroup::"
          done < <(find . -name '*.json' ! -path './.git/*' -print0)
      - name: Check pi subagent model pins against enabledModels
        run: |
          set -euo pipefail
          bash .github/scripts/check-pi-model-pins.sh \
            dot_pi/agent/agents dot_pi/agent/settings.json
      - name: Validate rendered TOML/JSON templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            # .chezmoi.toml.tmpl uses the `headless` promptBoolOnce INIT
            # function, so it must render with --init, which resolves the prompt
            # to its false default non-interactively. --promptDefaults is NOT
            # passed because execute-template rejects that flag. Every other
            # config template uses plain rendering and still sees user [data].
            case "$f" in
              *.chezmoi.toml.tmpl)
                rendered=$(chezmoi execute-template --init < "$f")
                ;;
              *)
                rendered=$(chezmoi execute-template < "$f")
                ;;
            esac
            case "$f" in
              *.toml.tmpl)
                printf '%s' "$rendered" \
                  | python3 -c \
                    'import sys, tomllib; tomllib.load(sys.stdin.buffer)'
                ;;
              *.json.tmpl)
                printf '%s' "$rendered" | jq empty
                ;;
            esac
            echo "::endgroup::"
          done < <(
            find . \( -name '*.toml.tmpl' -o -name '*.json.tmpl' \) \
              ! -path './.git/*' -print0
          )

  chezmoi-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: chezmoi apply --dry-run
        run: chezmoi apply --dry-run --verbose --exclude=scripts

  home-manager:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon; macos-15-intel builds x86_64-darwin.
        os: [ubuntu-latest, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      # v22, pinned so the installer executed by CI cannot move independently.
      - uses: >-
          DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      - name: Assert Phase 4 ownership, collisions, and secret isolation
        run: |
          set -euo pipefail
          jq -e '
            .schemaVersion == 1 and
            .migrationPhase == 4 and
            .active.homeManager.packages == [
              "atuin", "bat", "clang-tools", "direnv", "eza", "fd", "fzf",
              "gopls", "gum", "neovim", "nix-direnv", "pyright", "ripgrep",
              "rust-analyzer", "starship", "tmux", "typescript",
              "typescript-language-server", "zoxide"
            ] and
            .active.homeManager.commands == [
              "atuin", "bat", "clangd", "direnv", "eza", "fd", "fzf",
              "gopls", "gum", "nvim", "pyright", "pyright-langserver", "rg",
              "rust-analyzer", "starship", "tmux", "tsc", "tsserver",
              "typescript-language-server", "zoxide"
            ] and
            .active.homeManager.writableConfigs == [] and
            .active.homeManager.services == [] and
            .target.homeManager.writableConfigs == [] and
            .target.homeManager.services == []
          ' nix/data/tool-ownership.json >/dev/null
          while IFS= read -r package; do
            if grep -qE "^[[:space:]]*- name: $package$" \
              .chezmoidata/packages.yaml; then
              echo "Duplicate package owner in packages.yaml: $package" >&2
              exit 1
            fi
          done < <(jq -r '.active.homeManager.packages[]' \
            nix/data/tool-ownership.json)
          mise_claim_pattern='fzf@|neovim@|direnv@|aqua:direnv/direnv'
          mise_claim_pattern+='|npm:pyright|npm:typescript(-language-server)?'
          mise_claim_pattern+='|go:golang.org/x/tools/gopls|rust-analyzer'
          if grep -Eq "$mise_claim_pattern" \
            .chezmoiscripts/run_once_before_10-install-packages.sh.tmpl; then
            echo 'mise still claims an active Home Manager tool' >&2
            exit 1
          fi
          test -f .chezmoiscripts/run_after_50-verify-lsp-servers.sh.tmpl
          test ! -e \
            .chezmoiscripts/run_onchange_after_50-install-lsp-servers.sh.tmpl
          test ! -e dot_config/fish/functions/lsp-upgrade.fish.tmpl
          if grep -q 'tsNodeModulesRel' .chezmoi.toml.tmpl || \
            grep -q 'NODE_PATH' dot_config/fish/config.fish.tmpl; then
            echo 'The mise TypeScript NODE_PATH workaround is still active' >&2
            exit 1
          fi
          expected_direnvrc="source \"\$HOME/.nix-profile/share/"
          expected_direnvrc+='nix-direnv/direnvrc"'
          if [[ "$(tail -n 1 dot_config/direnv/direnvrc)" != \
            "$expected_direnvrc" ]] || \
            grep -q 'source_url' dot_config/direnv/direnvrc; then
            echo 'direnvrc must load the Home Manager nix-direnv package' >&2
            exit 1
          fi
          secret_pattern='builtins\.getEnv|--impure|onepasswordRead|op://'
          secret_pattern+='|(^|[^[:alnum:]_])op[[:space:]]'
          if grep -R -n -E "$secret_pattern" --include='*.nix' nix; then
            printf '%s\n' \
              'Forbidden secret or impurity mechanism in the Nix subtree' >&2
            exit 1
          fi
          # base.nix force-clears Home Manager's internal .keep files and
          # asserts the evaluated home.file set is empty. It is the only
          # permitted home.file assignment; reject any future claim elsewhere.
          allowed_home_file='^nix/modules/base\.nix:[0-9]+:'
          allowed_home_file+='[[:space:]]*home\.file = lib\.mkForce \{ \};$'
          unexpected_home_file=$(grep -R -n -E \
            'home\.file[[:space:]]*=[[:space:]]+' --include='*.nix' nix | \
            grep -vE "$allowed_home_file" || true)
          if [[ -n "$unexpected_home_file" ]]; then
            echo "$unexpected_home_file" >&2
            echo 'Unexpected Home Manager file ownership assignment' >&2
            exit 1
          fi
          ownership_pattern='xdg\.configFile|programs\.fish'
          ownership_pattern+='|systemd\.user\.services|launchd\.agents'
          if grep -R -n -E "$ownership_pattern" --include='*.nix' nix; then
            printf '%s\n' \
              'Home Manager cannot own writable configs or Phase 4 services' >&2
            exit 1
          fi
      - name: Check Nix formatting
        run: |
          set -euo pipefail
          case "$(uname -s):$(uname -m)" in
            Linux:x86_64) system=x86_64-linux ;;
            Darwin:arm64) system=aarch64-darwin ;;
            Darwin:x86_64) system=x86_64-darwin ;;
            *) echo "Unsupported native CI system" >&2; exit 1 ;;
          esac
          formatter=$(nix build --no-link --print-out-paths \
            --no-write-lock-file \
            "path:$GITHUB_WORKSPACE/nix#formatter.$system")
          "$formatter/bin/treefmt" --ci \
            --working-dir "$GITHUB_WORKSPACE" nix
      - name: Evaluate and build native Home Manager checks
        run: nix flake check --no-write-lock-file "path:$GITHUB_WORKSPACE/nix"
      - name: Verify the standalone Home Manager runner
        run: |
          nix run --no-write-lock-file \
            "path:$GITHUB_WORKSPACE/nix#home-manager" -- --version
      - name: Build native activation packages explicitly
        run: |
          set -euo pipefail
          case "$(uname -s):$(uname -m)" in
            Linux:x86_64)
              configurations=(
                max@linux-desktop
                max@linux-headless
                max@wsl
                ci@linux-desktop
                ci@linux-headless
                ci@wsl
              )
              ;;
            Darwin:arm64)
              configurations=(max@macos-aarch64 ci@macos-aarch64)
              ;;
            Darwin:x86_64)
              configurations=(max@macos-x86_64 ci@macos-x86_64)
              ;;
            *)
              echo "Unsupported native CI system: $(uname -s):$(uname -m)" >&2
              exit 1
              ;;
          esac
          for configuration in "${configurations[@]}"; do
            nix build --no-link --no-write-lock-file \
              "path:$GITHUB_WORKSPACE/nix#homeConfigurations.\"$configuration\".activationPackage"
          done
      - name: Run native LSP probes from the built profile
        run: |
          set -euo pipefail
          case "$(uname -s):$(uname -m)" in
            Linux:x86_64) configuration=ci@linux-desktop ;;
            Darwin:arm64) configuration=ci@macos-aarch64 ;;
            Darwin:x86_64) configuration=ci@macos-x86_64 ;;
            *) echo "Unsupported native CI system" >&2; exit 1 ;;
          esac
          home_path=$(nix build --no-link --print-out-paths \
            --no-write-lock-file \
            "path:$GITHUB_WORKSPACE/nix#homeConfigurations.\"$configuration\".config.home.path")
          test_root=$(mktemp -d)
          test_home="$test_root/home"
          rendered="$test_root/fresh.sh"
          legacy_config="$test_root/legacy.toml"
          legacy_rendered="$test_root/legacy.sh"
          trap 'rm -rf "$test_root"' EXIT
          mkdir -p "$test_home"
          ln -s "$home_path" "$test_home/.nix-profile"
          test -x "$home_path/bin/clangd"
          test ! -e "$home_path/bin/clang-format"
          test ! -e "$home_path/bin/clang-tidy"
          chezmoi execute-template \
            < .chezmoiscripts/run_after_50-verify-lsp-servers.sh.tmpl \
            > "$rendered"
          HOME="$test_home" bash "$rendered"
          sed -e '/^[[:space:]]*probeBin =/d' \
            -e '/^[[:space:]]*probeArgs =/d' \
            -e '/^[[:space:]]*initializeProbe =/d' \
            -e '/^[[:space:]]*initializeWithoutNodePath =/d' \
            "$HOME/.config/chezmoi/chezmoi.toml" > "$legacy_config"
          chezmoi --config "$legacy_config" execute-template \
            < .chezmoiscripts/run_after_50-verify-lsp-servers.sh.tmpl \
            > "$legacy_rendered"
          HOME="$test_home" bash "$legacy_rendered"
