---
name: ci

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nix-evaluation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      # v3
      - uses: >-
          DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88
      - name: Evaluate every supported system
        run: nix flake check --all-systems --no-build "path:$PWD/nix"
      - name: Check Nix formatting
        run: |
          set -euo pipefail
          flake="path:$PWD/nix"
          system=$(nix eval --impure --raw --expr builtins.currentSystem)
          formatter=$(
            nix build "$flake#formatter.$system" \
              --no-link \
              --print-out-paths
          )
          "$formatter/bin/nixfmt" --check nix/*.nix

  nix-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      # v3
      - name: Install Determinate Nix
        if: matrix.os != 'macos-15-intel'
        uses: >-
          DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88
      # v31.11.0 - Determinate Nix no longer supports Intel macOS.
      - name: Install upstream Nix on Intel macOS
        if: matrix.os == 'macos-15-intel'
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342
      - name: Build every bundle and run checks
        run: |
          set -euo pipefail
          flake="path:$PWD/nix"
          nix build \
            "$flake#core" \
            "$flake#headless" \
            "$flake#lsp" \
            "$flake#workstation" \
            "$flake#default" \
            --no-link
          nix flake check "$flake"
      - name: Report workstation closure size
        run: |
          set -euo pipefail
          flake="path:$PWD/nix"
          out=$(nix build "$flake#workstation" --no-link --print-out-paths)
          nix path-info --closure-size --human-readable "$out"
          nix path-info --recursive --size --human-readable "$out"
      - name: Test profile idempotency and rollback
        run: bash .github/scripts/test-nix-profile.sh

  # The static-analysis jobs that render templates (shellcheck + fish-syntax)
  # run on macOS as well as Linux. `chezmoi execute-template` renders with the
  # runner's OS, so only the macos-latest leg exercises the darwin half of every
  # template ({{ if eq .chezmoi.os "darwin" }} ... {{ end }}); on ubuntu
  # those blocks are stripped before shellcheck / fish -n ever see them.
  # Both legs stay STATIC (render + lint only) - no real brew package installs.
  shellcheck:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y -qq shellcheck
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install shellcheck
      - name: Shellcheck plain scripts
        run: |
          set -euo pipefail
          shellcheck --severity=warning -s bash \
            dot_claude/executable_statusline.sh \
            .github/scripts/check-pi-model-pins.sh \
            .github/scripts/create-direnv-flake-fixture.sh \
            .github/scripts/test-nix-profile.sh \
            .github/scripts/test-runtime-path-order.sh \
            .github/e2e/verify.sh
          shellcheck --severity=warning -s sh \
            private_dot_local/bin/executable_zenity-askpass
          # Glob covers future tmux helpers and is a no-op if there are none.
          find dot_config/tmux -name 'executable_*.sh' \
            -exec shellcheck --severity=warning -s bash {} +
      - name: Shellcheck rendered script templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            chezmoi execute-template < "$f" \
              | shellcheck --severity=warning -s bash -
            echo "::endgroup::"
          done < <(find .chezmoiscripts -name '*.sh.tmpl' -print0)

  fish-syntax:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install fish (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y -qq fish
      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install fish
      - name: fish -n on plain fish files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            fish -n "$f"
            echo "::endgroup::"
          done < <(find dot_config/fish -name '*.fish' -print0)
      - name: fish -n on rendered fish templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            # Use a template instead of `mktemp --suffix=.fish`, whose GNU-only
            # --suffix flag is absent on the macOS leg's BSD mktemp. `fish -n`
            # parses by content, so the file extension is irrelevant.
            tmp=$(mktemp "${TMPDIR:-/tmp}/ci-fish.XXXXXX")
            chezmoi execute-template < "$f" > "$tmp"
            fish -n "$tmp"
            rm -f "$tmp"
            echo "::endgroup::"
          done < <(find dot_config/fish -name '*.fish.tmpl' -print0)
      - name: Test runtime PATH ownership (Linux)
        if: runner.os == 'Linux'
        run: bash .github/scripts/test-runtime-path-order.sh

  config-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install jq
        run: sudo apt-get install -y -qq jq
      - name: Validate TOML files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            python3 -c \
              'import sys, tomllib; tomllib.load(open(sys.argv[1], "rb"))' \
              "$f"
            echo "::endgroup::"
          done < <(find . -name '*.toml' ! -path './.git/*' -print0)
      - name: Validate JSON files
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            jq empty "$f"
            echo "::endgroup::"
          done < <(find . -name '*.json' ! -path './.git/*' -print0)
      - name: Check exact LSP package ownership
        run: python3 .github/scripts/check-lsp-ownership.py
      - name: Check pi subagent model pins against enabledModels
        run: |
          set -euo pipefail
          bash .github/scripts/check-pi-model-pins.sh \
            dot_pi/agent/agents dot_pi/agent/settings.json
      - name: Test Pi Treehouse worktree guard policy
        run: node .github/scripts/test-worktree-guard.mjs
      - name: Validate rendered TOML/JSON templates
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::$f"
            # .chezmoi.toml.tmpl uses the `headless` promptBoolOnce INIT
            # function, so it must render with --init, which resolves the prompt
            # to its false default non-interactively. --promptDefaults is NOT
            # passed because execute-template rejects that flag. Every other
            # config template uses plain rendering and still sees user [data].
            case "$f" in
              *.chezmoi.toml.tmpl)
                rendered=$(chezmoi execute-template --init < "$f")
                ;;
              *)
                rendered=$(chezmoi execute-template < "$f")
                ;;
            esac
            case "$f" in
              *.toml.tmpl)
                printf '%s' "$rendered" \
                  | python3 -c \
                    'import sys, tomllib; tomllib.load(sys.stdin.buffer)'
                ;;
              *.json.tmpl)
                printf '%s' "$rendered" | jq empty
                ;;
            esac
            echo "::endgroup::"
          done < <(
            find . \( -name '*.toml.tmpl' -o -name '*.json.tmpl' \) \
              ! -path './.git/*' -print0
          )

  chezmoi-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: chezmoi apply --dry-run
        run: chezmoi apply --dry-run --verbose --exclude=scripts
