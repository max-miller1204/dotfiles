---
# On-demand native-Ubuntu E2E: run the real bootstrap on ephemeral Ubuntu
# 24.04 runners with fresh chezmoi and Home Manager user state. The matrix
# proves both desktop and headless profile selection and idempotence. Hosted
# runners contain preinstalled tools, so the preflight inventory records them
# instead of claiming that this workflow installed every command from scratch.
# Dispatch-only: this installs multi-GB toolchains and GUI packages.
name: e2e-native-ubuntu

"on":
  workflow_dispatch:
    inputs:
      expected_head:
        description: >-
          Immutable commit SHA the dispatched ref must resolve to before apply
        required: true
        type: string

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: linux-desktop
            configuration: ci@linux-desktop
            fault_injection: true
          - profile: linux-headless
            configuration: ci@linux-headless
            fault_injection: false
    # Pinned OS version, not ubuntu-latest: this job's claim is specifically
    # native Ubuntu 24.04 behavior.
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Assert environment (Ubuntu 24.04, non-WSL kernel, pinned tree)
        env:
          EXPECTED_HEAD: ${{ inputs.expected_head }}
        run: |
          set -euo pipefail
          . /etc/os-release
          echo "os: $PRETTY_NAME  kernel: $(uname -r)"
          [ "$VERSION_ID" = "24.04" ]
          case "$(uname -r)" in
            *[Mm]icrosoft*) echo "WSL kernel on runner?!"; exit 1 ;;
          esac
          HEAD="$(git rev-parse HEAD)"
          echo "tree HEAD: $HEAD"
          test -n "$EXPECTED_HEAD"
          test "$HEAD" = "$EXPECTED_HEAD"
          test ! -e "$HOME/.config/chezmoi/chezmoi.toml"
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          test ! -e "$state_home/nix/profiles/home-manager"
          test ! -L "$state_home/nix/profiles/home-manager"
          test ! -e "$state_home/nix/profiles/profile"
          test ! -L "$state_home/nix/profiles/profile"

      - name: Preflight inventory (preexisting bins are not proven by this job)
        run: |
          bash .github/e2e/verify.sh preflight \
            | tee "$RUNNER_TEMP/preflight.txt"
          exit "${PIPESTATUS[0]}"

      - name: Free disk space
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Make sudo env stock-Ubuntu-like (HOME reset, no XDG_CONFIG_HOME)
        run: |
          set -euo pipefail
          echo "sudo HOME before: $(sudo sh -c 'echo $HOME')"
          sudo_xdg=$(sudo sh -c 'echo $XDG_CONFIG_HOME')
          echo "sudo XDG_CONFIG_HOME before: [$sudo_xdg]"
          sudo grep -rn 'env_reset\|env_keep\|always_set_home' \
            /etc/sudoers /etc/sudoers.d/ || true
          grep -n 'XDG' /etc/environment || true
          if [ "$(sudo sh -c 'echo $HOME')" != /root ]; then
            # Runner sudo preserves the caller's environment (!env_reset style),
            # so root-elevated installers touching $HOME (e.g. the Nix
            # installer's fish self-test) write root-owned files into the runner
            # user's home and break chezmoi's later chmod - an artifact stock
            # Ubuntu (which resets HOME to the target user's) never hits. Force
            # the stock behavior regardless of which mechanism preserves it.
            echo 'Defaults always_set_home' | \
              sudo tee /etc/sudoers.d/zzz-e2e-always-set-home >/dev/null
            sudo chmod 440 /etc/sudoers.d/zzz-e2e-always-set-home
          fi
          if [ "$(sudo sh -c 'echo $HOME')" != /root ]; then
            echo "sudo still preserves HOME" >&2
            exit 1
          fi
          # The runner image also writes XDG_CONFIG_HOME=$HOME/.config into
          # /etc/environment (actions/runner-images configure-environment.sh);
          # the job env carries it EXPANDED (/home/runner/.config), and it
          # reaches root-elevated processes during the apply (run 28558929981
          # forensics: the nix installer's root fish self-test created a
          # root-owned ~/.config/fish that broke chezmoi's chmod). Stock Ubuntu
          # sets no XDG vars in /etc/environment, so remove the artifact and
          # keep it out of the apply step's env below.
          sudo sed -i '/^XDG_CONFIG_HOME=/d' /etc/environment
          sudo_xdg=$(sudo sh -c 'echo $XDG_CONFIG_HOME')
          echo "sudo XDG_CONFIG_HOME after: [$sudo_xdg]"

      - name: Stage source where a real init would clone it
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/share/chezmoi"
          cp -a "$GITHUB_WORKSPACE/." "$HOME/.local/share/chezmoi/"
          git -C "$HOME/.local/share/chezmoi" rev-parse HEAD
          mkdir -p "$HOME/.local/bin" "$HOME/.config/mise" \
            "$HOME/.local/share/mise/shims" \
            "$HOME/.local/share/mise/installs/legacy-runtime"
          printf '%s\n' retained-mise-executable >"$HOME/.local/bin/mise"
          printf '%s\n' retained-mise-shim \
            >"$HOME/.local/share/mise/shims/legacy-node"
          printf '%s\n' retained-mise-install \
            >"$HOME/.local/share/mise/installs/legacy-runtime/marker"
          printf '%s\n' retained-mise-config >"$HOME/.config/mise/config.toml"
          chmod +x "$HOME/.local/bin/mise" \
            "$HOME/.local/share/mise/shims/legacy-node"

      - name: Install chezmoi (README one-liner)
        run: |
          set -euo pipefail
          sh -c "$(curl -fsSL https://get.chezmoi.io)" -- -b "$HOME/.local/bin"
          "$HOME/.local/bin/chezmoi" --version

      - name: Source check (confirm the nix invocation in the staged tree)
        run: |
          set -euo pipefail
          # Plain grep of the template text: rendering needs the chezmoi config,
          # which does not exist until the init --apply step below.
          scripts_dir="$HOME/.local/share/chezmoi/.chezmoiscripts"
          install_script=$(printf '%s/%s' "$scripts_dir" \
            'run_once_before_10-install-packages.sh.tmpl')
          grep -n -B2 -A2 'determinate' "$install_script"

      - name: Arm config watcher (attribute who creates ~/.config/fish)
        run: |
          set -euo pipefail
          sudo apt-get install -y -qq inotify-tools
          mkdir -p "$HOME/.config"
          watcher="$RUNNER_TEMP/watch-config.sh"
          cat >"$watcher" <<'WATCHER'
          #!/usr/bin/env bash
          inotifywait -m -e create -e moved_to \
            --format "%T %w%f %e" --timefmt "%H:%M:%S" \
            "$HOME/.config" 2>/dev/null |
            while read -r line; do
              echo "$line" >>"$HOME/fishwatch.log"
              case "$line" in
                *config/fish*)
                  {
                    stat -c "owner=%U group=%G mode=%a %n" \
                      "$HOME/.config/fish"
                    echo "--- processes at creation ---"
                    ps -ef | tail -50
                  } >>"$HOME/fishwatch.log" 2>&1
                  ;;
              esac
            done
          WATCHER
          nohup bash "$watcher" >/dev/null 2>&1 &
          echo "watcher pid $!"

      - name: chezmoi init --apply (${{ matrix.profile }})
        env:
          DOTFILES_HM_CONFIGURATION: ${{ matrix.configuration }}
          PROFILE: ${{ matrix.profile }}
        run: |
          set -euo pipefail
          # A real login session on stock Ubuntu exports no XDG_CONFIG_HOME;
          # the runner's worker process injected one (see the sudo-env step).
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          case "$PROFILE" in
            linux-desktop)
              init_args=(--promptDefaults)
              ;;
            linux-headless)
              init_args=(--promptBool headless=true)
              ;;
            *)
              echo "Unsupported E2E profile: $PROFILE" >&2
              exit 1
              ;;
          esac
          chezmoi init --apply "${init_args[@]}" 2>&1 | tee apply.log
          test "${PIPESTATUS[0]}" -eq 0
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          grep -Fxq '<none>' \
            "$state_home/dotfiles/home-manager-before-switch"
          grep -Fxq '${{ matrix.configuration }}' \
            "$state_home/dotfiles/home-manager-configuration"
          readlink -f "$state_home/nix/profiles/home-manager" \
            >first-generation.txt
          readlink -f "$state_home/nix/profiles/profile" \
            >first-package-profile.txt

      - name: Reapply and verify Home Manager idempotence
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          profile="$state_home/nix/profiles/home-manager"
          before=$(readlink -f "$profile")
          test "$before" = "$(cat first-generation.txt)"
          chezmoi apply --force --no-tty 2>&1 | tee second-apply.log
          test "${PIPESTATUS[0]}" -eq 0
          after=$(readlink -f "$profile")
          test "$before" = "$after"
          printf '%s\n' "$after" >second-generation.txt
          readlink -f "$state_home/nix/profiles/profile" \
            >second-package-profile.txt
          cmp -s first-package-profile.txt second-package-profile.txt
          grep -q 'Ensuring current Node LTS' apply.log
          grep -q 'Installing current Pi and Hunk' apply.log
          runtime_pattern='Ensuring current Node LTS'
          runtime_pattern+='|Installing current Pi and Hunk'
          if grep -qE "$runtime_pattern" second-apply.log; then
            echo 'Unchanged runtime run_onchange scripts reran' >&2
            exit 1
          fi
          sed 's/^/SECOND-APPLY: /' second-apply.log >>apply.log

      - name: Reject invalid selection and preserve the generation
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          profile="$state_home/nix/profiles/home-manager"
          before=$(readlink -f "$profile")
          if DOTFILES_HM_CONFIGURATION=missing-configuration \
            chezmoi apply --force --no-tty >invalid-selection.log 2>&1; then
            echo 'Invalid Home Manager configuration unexpectedly activated' >&2
            exit 1
          fi
          grep -q 'Invalid Home Manager configuration' invalid-selection.log
          test "$before" = "$(readlink -f "$profile")"

      - name: Failed Home Manager build preserves the generation
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          source_dir="$HOME/.local/share/chezmoi"
          common_profile="$source_dir/nix/profiles/common.nix"
          backup="$RUNNER_TEMP/common-build.nix"
          cp "$common_profile" "$backup"
          trap 'cp "$backup" "$common_profile"' EXIT
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          profile="$state_home/nix/profiles/home-manager"
          package_profile="$state_home/nix/profiles/profile"
          before=$(readlink -f "$profile")
          before_package=$(readlink -f "$package_profile")
          cat >"$common_profile" <<'NIX'
          {
            imports = [
              ../modules/cli.nix
              ../modules/direnv.nix
              ../modules/lsp.nix
              ../modules/runtimes.nix
              ../modules/services.nix
              ({ pkgs, ... }:
                {
                  home.packages = [
                    (pkgs.runCommand "intentional-e2e-failure" { } ''
                      echo "intentional E2E build failure" >&2
                      exit 1
                    '')
                  ];
                }
              )
            ];
          }
          NIX
          if chezmoi apply --force --no-tty >failed-build.log 2>&1; then
            echo 'Broken Home Manager module unexpectedly activated' >&2
            exit 1
          fi
          grep -q 'intentional E2E build failure' failed-build.log
          test "$before" = "$(readlink -f "$profile")"
          test "$before_package" = "$(readlink -f "$package_profile")"
          cp "$backup" "$common_profile"
          trap - EXIT

      - name: Failed Home Manager activation rolls back profiles
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          source_dir="$HOME/.local/share/chezmoi"
          common_profile="$source_dir/nix/profiles/common.nix"
          backup="$RUNNER_TEMP/common-activation.nix"
          cp "$common_profile" "$backup"
          trap 'cp "$backup" "$common_profile"' EXIT
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          profile="$state_home/nix/profiles/home-manager"
          package_profile="$state_home/nix/profiles/profile"
          before=$(readlink -f "$profile")
          before_package=$(readlink -f "$package_profile")
          cat >"$common_profile" <<'NIX'
          {
            imports = [
              ../modules/cli.nix
              ../modules/direnv.nix
              ../modules/lsp.nix
              ../modules/runtimes.nix
              ../modules/services.nix
              ({ lib, ... }:
                {
                  home.activation.intentionalE2EFailure =
                    lib.hm.dag.entryAfter [ "installPackages" ] ''
                      echo "intentional E2E activation failure" >&2
                      exit 1
                    '';
                }
              )
            ];
          }
          NIX
          if chezmoi apply --force --no-tty \
            >failed-activation.log 2>&1; then
            echo 'Broken Home Manager activation unexpectedly succeeded' >&2
            exit 1
          fi
          grep -q 'intentional E2E activation failure' failed-activation.log
          grep -q 'Restoring Home Manager generation' failed-activation.log
          test "$before" = "$(readlink -f "$profile")"
          test "$before_package" = "$(readlink -f "$package_profile")"
          cp "$backup" "$common_profile"
          trap - EXIT

      - name: Failed LSP verification rolls back profiles
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          source_dir="$HOME/.local/share/chezmoi"
          common_profile="$source_dir/nix/profiles/common.nix"
          config_file="$HOME/.config/chezmoi/chezmoi.toml"
          common_backup="$RUNNER_TEMP/common-lsp.nix"
          config_backup="$RUNNER_TEMP/chezmoi-lsp.toml"
          cp "$common_profile" "$common_backup"
          cp "$config_file" "$config_backup"
          restore_lsp_test() {
            cp "$common_backup" "$common_profile"
            cp "$config_backup" "$config_file"
          }
          trap restore_lsp_test EXIT
          state_home="${XDG_STATE_HOME:-$HOME/.local/state}"
          profile="$state_home/nix/profiles/home-manager"
          package_profile="$state_home/nix/profiles/profile"
          before=$(readlink -f "$profile")
          before_package=$(readlink -f "$package_profile")
          cat >"$common_profile" <<'NIX'
          {
            imports = [
              ../modules/cli.nix
              ../modules/direnv.nix
              ../modules/lsp.nix
              ../modules/runtimes.nix
              ../modules/services.nix
              ({ pkgs, ... }: { home.packages = [ pkgs.hello ]; })
            ];
          }
          NIX
          lsp_pattern='0,/verifyBin = "rust-analyzer"/'
          lsp_pattern+='s//verifyBin = "missing-phase4-lsp"/'
          sed -i.bak "$lsp_pattern" "$config_file"
          if chezmoi apply --force --no-tty >failed-lsp-probe.log 2>&1; then
            echo 'Broken LSP generation unexpectedly remained active' >&2
            exit 1
          fi
          grep -q 'Missing Home Manager LSP command' failed-lsp-probe.log
          grep -q 'Restoring Home Manager generation' failed-lsp-probe.log
          test "$before" = "$(readlink -f "$profile")"
          test "$before_package" = "$(readlink -f "$package_profile")"
          cp "$common_backup" "$common_profile"
          cp "$config_backup" "$config_file"
          trap - EXIT

      - name: Failed first activation removes new profiles
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          source_dir="$HOME/.local/share/chezmoi"
          common_profile="$source_dir/nix/profiles/common.nix"
          backup="$RUNNER_TEMP/common-first-activation.nix"
          cp "$common_profile" "$backup"
          trap 'cp "$backup" "$common_profile"' EXIT
          first_state="$RUNNER_TEMP/first-home-manager-state"
          rm -rf "$first_state"
          mkdir -p "$first_state/nix/profiles"
          normal_state="${XDG_STATE_HOME:-$HOME/.local/state}"
          normal_profile=$(readlink -f \
            "$normal_state/nix/profiles/home-manager")
          normal_package=$(readlink -f "$normal_state/nix/profiles/profile")
          cat >"$common_profile" <<'NIX'
          {
            imports = [
              ../modules/cli.nix
              ../modules/direnv.nix
              ../modules/lsp.nix
              ../modules/runtimes.nix
              ../modules/services.nix
              ({ lib, ... }:
                {
                  home.activation.intentionalFirstE2EFailure =
                    lib.hm.dag.entryAfter [ "installPackages" ] ''
                      echo "intentional first activation failure" >&2
                      exit 1
                    '';
                }
              )
            ];
          }
          NIX
          if XDG_STATE_HOME="$first_state" \
            chezmoi apply --force --no-tty \
            >failed-first-activation.log 2>&1; then
            echo 'Broken first Home Manager activation unexpectedly' \
              'succeeded' >&2
            exit 1
          fi
          grep -q 'intentional first activation failure' \
            failed-first-activation.log
          grep -q 'Removing the failed first Home Manager generation' \
            failed-first-activation.log
          test ! -e "$first_state/nix/profiles/home-manager"
          test ! -e "$first_state/nix/profiles/profile"
          if [[ -d "$first_state/nix/profiles" ]]; then
            test -z "$(find "$first_state/nix/profiles" \
              -type l -print -quit)"
          fi
          test "$normal_profile" = "$(readlink -f \
            "$normal_state/nix/profiles/home-manager")"
          test "$normal_package" = "$(readlink -f \
            "$normal_state/nix/profiles/profile")"
          cp "$backup" "$common_profile"
          trap - EXIT

      - name: Failed first LSP verification removes new profiles
        if: ${{ matrix.fault_injection }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          config_file="$HOME/.config/chezmoi/chezmoi.toml"
          config_backup="$RUNNER_TEMP/chezmoi-first-lsp.toml"
          cp "$config_file" "$config_backup"
          trap 'cp "$config_backup" "$config_file"' EXIT
          first_state="$RUNNER_TEMP/first-lsp-state"
          rm -rf "$first_state"
          mkdir -p "$first_state/nix/profiles"
          normal_state="${XDG_STATE_HOME:-$HOME/.local/state}"
          normal_profile=$(readlink -f \
            "$normal_state/nix/profiles/home-manager")
          normal_package=$(readlink -f "$normal_state/nix/profiles/profile")
          lsp_pattern='0,/verifyBin = "rust-analyzer"/'
          lsp_pattern+='s//verifyBin = "missing-phase4-lsp"/'
          sed -i.bak "$lsp_pattern" "$config_file"
          if XDG_STATE_HOME="$first_state" \
            chezmoi apply --force --no-tty \
            >failed-first-lsp-probe.log 2>&1; then
            echo 'Broken first LSP generation unexpectedly remained active' >&2
            exit 1
          fi
          grep -q 'Missing Home Manager LSP command' \
            failed-first-lsp-probe.log
          grep -q 'Removing the failed first Home Manager generation' \
            failed-first-lsp-probe.log
          test ! -e "$first_state/nix/profiles/home-manager"
          test ! -e "$first_state/nix/profiles/profile"
          if [[ -d "$first_state/nix/profiles" ]]; then
            test -z "$(find "$first_state/nix/profiles" \
              -type l -print -quit)"
          fi
          test "$normal_profile" = "$(readlink -f \
            "$normal_state/nix/profiles/home-manager")"
          test "$normal_package" = "$(readlink -f \
            "$normal_state/nix/profiles/profile")"
          cp "$config_backup" "$config_file"
          trap - EXIT

      - name: Verify end state
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_head }}
        run: |
          set -euo pipefail
          unset XDG_CONFIG_HOME
          export PATH="$HOME/.local/bin:$PATH"
          APPLY_LOG="$PWD/apply.log" \
          SECOND_APPLY_LOG="$PWD/second-apply.log" \
          SECOND_APPLY_STATUS=0 \
          PROFILE_BEFORE_SECOND="$(cat first-generation.txt)" \
          PROFILE_AFTER_SECOND="$(cat second-generation.txt)" \
          PACKAGE_BEFORE_SECOND="$(cat first-package-profile.txt)" \
          PACKAGE_AFTER_SECOND="$(cat second-package-profile.txt)" \
            bash .github/e2e/verify.sh verify runner \
              '${{ matrix.configuration }}' | tee verify-report.txt
          exit "${PIPESTATUS[0]}"

      - name: Ownership forensics on failure
        if: failure()
        run: |
          ls -la "$HOME/.config" 2>/dev/null || true
          stat -c 'owner=%U group=%G mode=%a %n' \
            "$HOME/.config/fish" 2>/dev/null || true
          echo "--- root's config ---"
          sudo ls -la /root/.config/ /root/.config/fish 2>/dev/null || true
          echo "--- watcher log ---"
          cat "$HOME/fishwatch.log" 2>/dev/null || echo "no watcher log"
          sudo sh -c 'echo sudo HOME now: $HOME'

      - name: Build evidence manifest
        if: always()
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          EXPECTED_HEAD: ${{ inputs.expected_head }}
          PROFILE: ${{ matrix.profile }}
        run: |
          set -uo pipefail
          evidence_dir="$PWD/evidence"
          staged_source="$HOME/.local/share/chezmoi"
          mkdir -p "$evidence_dir"
          actual_head=unavailable
          source_sha_matches=false
          source_clean=unavailable
          if candidate_head="$(git -C "$staged_source" rev-parse HEAD \
            2>/dev/null)"; then
            actual_head="$candidate_head"
            if [[ "$actual_head" = "$EXPECTED_HEAD" ]]; then
              source_sha_matches=true
            fi
            source_clean=false
            if [[ -z "$(git -C "$staged_source" status --porcelain \
              2>/dev/null)" ]]; then
              source_clean=true
            fi
          fi
          {
            printf 'expected_source_sha=%s\n' "$EXPECTED_HEAD"
            printf 'actual_source_sha=%s\n' "$actual_head"
            printf 'source_sha_matches=%s\n' "$source_sha_matches"
            printf 'source_clean=%s\n' "$source_clean"
            printf 'profile=%s\n' "$PROFILE"
            printf 'configuration=%s\n' "$CONFIGURATION"
            printf 'utc=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            . /etc/os-release
            printf 'os=%s\n' "$PRETTY_NAME"
            printf 'architecture=%s\n' "$(uname -m)"
            printf 'kernel=%s\n' "$(uname -r)"
          } >"$evidence_dir/evidence-summary.txt"
          for evidence_file in ./*.log ./*.txt; do
            if [[ -f "$evidence_file" ]]; then
              cp "$evidence_file" "$evidence_dir/"
            fi
          done
          if [[ -f "$RUNNER_TEMP/preflight.txt" ]]; then
            cp "$RUNNER_TEMP/preflight.txt" "$evidence_dir/"
          fi
          if [[ -f "$HOME/fishwatch.log" ]]; then
            cp "$HOME/fishwatch.log" "$evidence_dir/"
          fi
          config="$HOME/.config/chezmoi/chezmoi.toml"
          if [[ -f "$config" ]]; then
            cp "$config" "$evidence_dir/chezmoi.toml"
          fi
          checksum_tmp="$RUNNER_TEMP/evidence-sha256.txt"
          (cd "$evidence_dir" && find . -maxdepth 1 -type f -print0 \
            | sort -z | xargs -0 -r sha256sum) >"$checksum_tmp"
          mv "$checksum_tmp" "$evidence_dir/evidence-sha256.txt"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-native-ubuntu-${{ matrix.profile }}
          path: evidence/

  prompt-selection:
    needs: e2e
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-chezmoi
      - name: Install expect
        run: sudo apt-get install -y -qq expect
      - name: Test interactive Linux profile selection
        env:
          DOTFILES_BRANCH: ${{ github.ref_name }}
          DOTFILES_REVISION: ${{ inputs.expected_head }}
        run: |
          set -euo pipefail
          bash .github/e2e/prompt-test.sh | tee prompt-test.txt
          exit "${PIPESTATUS[0]}"
      - name: Build prompt evidence
        if: always()
        env:
          EXPECTED_HEAD: ${{ inputs.expected_head }}
        run: |
          set -uo pipefail
          mkdir -p prompt-evidence
          actual_head=unavailable
          source_sha_matches=false
          if candidate_head="$(git rev-parse HEAD 2>/dev/null)"; then
            actual_head="$candidate_head"
            if [[ "$actual_head" = "$EXPECTED_HEAD" ]]; then
              source_sha_matches=true
            fi
          fi
          {
            printf 'expected_source_sha=%s\n' "$EXPECTED_HEAD"
            printf 'actual_source_sha=%s\n' "$actual_head"
            printf 'source_sha_matches=%s\n' "$source_sha_matches"
          } >prompt-evidence/evidence-summary.txt
          if [[ -f prompt-test.txt ]]; then
            cp prompt-test.txt prompt-evidence/
          fi
          checksum_tmp="$RUNNER_TEMP/prompt-evidence-sha256.txt"
          (cd prompt-evidence && find . -maxdepth 1 -type f -print0 \
            | sort -z | xargs -0 -r sha256sum) >"$checksum_tmp"
          mv "$checksum_tmp" prompt-evidence/evidence-sha256.txt
      - name: Upload prompt transcript
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-linux-profile-prompt
          path: prompt-evidence/
