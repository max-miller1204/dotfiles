# Generic backlog-issue form. Drop into a repo as
# .github/ISSUE_TEMPLATE/backlog-issue.yml so the backlog-from-spec skill
# (and humans) file issues in a consistent shape. Edit field labels freely —
# the skill maps content by meaning, not by exact name.
name: Backlog issue
description: A scoped unit of work — a missing capability or a planned task.
title: ""
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: The specific missing capability or task — concrete, not a theme.
      placeholder: "e.g. The normalize step has no unit-magnitude sanity check (mg vs g)."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Verifiable outcomes that mean this issue is done.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: >-
        Where this comes from and, for a gap analysis, the evidence it is not
        already done (source doc/section + what was searched in the codebase).
    validations:
      required: false
