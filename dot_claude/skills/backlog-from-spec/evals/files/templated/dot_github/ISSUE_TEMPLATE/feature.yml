name: Feature / task
description: A unit of planned work on pingpal.
title: ""
labels: ["needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is being built and why it matters.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: Concrete, checkable outcomes that close this issue.
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background & references
      description: Links, source docs, prior context.
    validations:
      required: false
